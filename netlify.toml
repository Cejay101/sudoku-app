[build]
  base    = "client"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all routes to Next.js (handled by the plugin, but explicit fallback)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
